<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobot Uz - Xarajatlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (!window.location.search.includes('standalone=true')) {
            window.location.href = 'daromad.html#xarajat';
        }
    </script>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <aside class="sidebar glass" id="sidebar">
        <div class="logo">
            <i class="fa-solid fa-chart-pie"></i> Hisobot Uz
        </div>
        <nav>
            <a href="otchet.html" class="nav-item"><i class="fa-solid fa-house"></i> Bosh sahifa</a>
            <a href="daromad.html" class="nav-item"><i class="fa-solid fa-arrow-trend-up"></i> Daromadlar</a>
            <a href="xarajat.html" class="nav-item active"><i class="fa-solid fa-arrow-trend-down"></i> Xarajatlar</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div style="display:flex; align-items:center; gap: 16px;">
                <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
                <h1>Xarajatlar Ro'yxati</h1>
            </div>
            <button class="btn btn-primary" onclick="openModal('expense')">
                <i class="fa-solid fa-plus"></i> Xarajat Qo'shish
            </button>
        </header>

        <div class="widgets" style="grid-template-columns: 1fr;">
            <div class="widget glass">
                <p>Filtrlangan Xarajatlar Jami</p>
                <h2 id="pageTotal" class="text-expense">0 UZS</h2>
            </div>
        </div>

        <div class="transactions glass">
            <h3>Barcha Xarajatlar</h3>
            <div id="transactionsContainer"></div>
        </div>
    </main>

    <!-- Modal Base (Identical to main, loaded by JS) -->
    <div id="transactionModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Yangi Amaliyot</h2>
                <button class="btn-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="type-toggle">
                <button type="button" class="type-toggle-btn active expense" id="btnTypeExpense" onclick="setTransactionType('expense')">Xarajat</button>
                <button type="button" class="type-toggle-btn income" id="btnTypeIncome" onclick="setTransactionType('income')">Daromad</button>
            </div>
            
            <button type="button" class="btn btn-voice" id="btnVoice" style="width:100%; margin-bottom: 20px; justify-content:center;">
                <i class="fa-solid fa-microphone"></i> Ovozli kiritish
            </button>

            <form id="transactionForm">
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Summa (UZS)</label>
                        <button type="button" onclick="toggleMiniCalc()" style="background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:14px;"><i class="fa-solid fa-calculator"></i> Kalkulyator</button>
                    </div>
                    <input type="number" id="amount" class="form-control" required min="1" step="1" placeholder="0">
                    
                    <!-- Mini Calculator Panel (Floating) -->
                    <div id="miniCalc" class="glass" style="display:none; position: fixed; right: 20px; bottom: 20px; width: 280px; z-index: 10001; padding: 15px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); cursor: default; animation: slideUp 0.3s ease;">
                        <div id="calcHeader" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; cursor: move; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                            <span style="font-size: 13px; font-weight: 600; color: var(--accent);"><i class="fa-solid fa-calculator"></i> Kalkulyator</span>
                            <button type="button" onclick="toggleMiniCalc()" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div id="calcScreen" style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: right; min-height: 45px; display: flex; align-items: center; justify-content: flex-end; font-size: 20px; font-weight: 700; color: white; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">0</div>
                        
                        <div style="grid-template-columns: repeat(4, 1fr); display: grid; gap: 8px;">
                            <button type="button" class="calc-btn" onclick="calcInput('7')">7</button>
                            <button type="button" class="calc-btn" onclick="calcInput('8')">8</button>
                            <button type="button" class="calc-btn" onclick="calcInput('9')">9</button>
                            <button type="button" class="calc-btn" onclick="calcInput('/')">/</button>
                            
                            <button type="button" class="calc-btn" onclick="calcInput('4')">4</button>
                            <button type="button" class="calc-btn" onclick="calcInput('5')">5</button>
                            <button type="button" class="calc-btn" onclick="calcInput('6')">6</button>
                            <button type="button" class="calc-btn" onclick="calcInput('*')">*</button>
                            
                            <button type="button" class="calc-btn" onclick="calcInput('1')">1</button>
                            <button type="button" class="calc-btn" onclick="calcInput('2')">2</button>
                            <button type="button" class="calc-btn" onclick="calcInput('3')">3</button>
                            <button type="button" class="calc-btn" onclick="calcInput('-')">-</button>
                            
                            <button type="button" class="calc-btn" onclick="calcInput('0')">0</button>
                            <button type="button" class="calc-btn" onclick="calcInput('.')">.</button>
                            <button type="button" class="calc-btn" style="background: var(--expense);" onclick="clearCalc()">C</button>
                            <button type="button" class="calc-btn" onclick="calcInput('+')">+</button>
                            
                            <button type="button" class="calc-btn" style="grid-column: span 2; background: var(--income); margin-top: 5px;" onclick="solveCalc()">=</button>
                            <button type="button" class="calc-btn" style="grid-column: span 2; background: var(--accent); margin-top: 5px; font-size: 13px;" onclick="transferResult()">Natijani kiritish</button>
                        </div>
                    </div>
                    <style>
                        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                        .calc-btn { padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.2s; }
                        .calc-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
                        .calc-btn:active { transform: translateY(0); }
                    </style>
                </div>
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="category" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>Sana</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Izoh (ixtiyoriy)</label>
                    <input type="text" id="description" class="form-control" placeholder="Masalan: Uy xarajatlari">
                </div>
                <button type="submit" class="btn btn-primary btn-submit">Saqlash</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // CALCULATOR SYSTEM
        let calcExpression = "";
        function toggleMiniCalc() {
            const panel = document.getElementById('miniCalc');
            if(panel.style.display === 'none' || !panel.style.display) {
                panel.style.display = 'block';
                makeDraggable(panel, document.getElementById('calcHeader'));
            } else {
                panel.style.display = 'none';
            }
        }
        function makeDraggable(el, header) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            header.onmousedown = dragMouseDown;
            function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px"; el.style.bottom = "auto"; el.style.right = "auto"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }
        function calcInput(val) {
            calcExpression += val;
            document.getElementById('calcScreen').innerText = calcExpression;
        }
        function clearCalc() {
            calcExpression = "";
            document.getElementById('calcScreen').innerText = "0";
        }
        function solveCalc() {
            try {
                const result = eval(calcExpression); 
                document.getElementById('calcScreen').innerText = result;
                calcExpression = result.toString();
            } catch(e) {
                alert('Hisob-kitobda xato!');
            }
        }
        function transferResult() {
            const result = document.getElementById('calcScreen').innerText;
            if(!isNaN(result)) {
                document.getElementById('amount').value = parseFloat(result);
            }
        }

        // KEYBOARD SUPPORT FOR CALCULATOR
        window.addEventListener('keydown', (e) => {
            const calc = document.getElementById('miniCalc');
            if (calc && calc.style.display !== 'none') {
                const key = e.key;
                if (/[0-9\+\-\*\/\.]/.test(key)) {
                    calcInput(key);
                } else if (key === 'Enter') {
                    solveCalc();
                } else if (key === 'Backspace') {
                    calcExpression = calcExpression.toString().slice(0, -1);
                    document.getElementById('calcScreen').innerText = calcExpression || "0";
                } else if (key === 'Escape') {
                    toggleMiniCalc();
                } else if (key.toLowerCase() === 'c' || key === 'Delete') {
                    clearCalc();
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => initApp('xarajat'));
    </script>
</body>
</html>
